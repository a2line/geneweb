name: release

on:
  push:
    tags:
      - v**        # Vraies releases
      - test-v**   # Releases de test
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release (for testing)'
        required: false
        type: boolean
        default: true

env:
  DUNE_PROFILE: "release"
  OPAMYES: true

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            ocaml-version: 5.4.0
            archive-name: geneweb-macos.zip
            use-ancient: true
          - os: ubuntu-latest
            ocaml-version: 5.4.0
            archive-name: geneweb-linux.zip
            use-ancient: true
          - os: windows-latest
            ocaml-version: 5.4.0
            archive-name: geneweb-windows.zip
            use-ancient: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Cache Opam dependencies (Unix)
        id: cache-opam-unix
        if: runner.os != 'Windows'
        uses: actions/cache@v5
        with:
          path: ~/.opam
          key: ${{ runner.os }}-release-${{ matrix.ocaml-version }}-${{ hashFiles('*.opam') }}
          restore-keys: |
            ${{ runner.os }}-release-${{ matrix.ocaml-version }}-

      - name: Cache Opam dependencies (Windows)
        id: cache-opam-windows
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: D:\.opam
          key: windows-release-${{ matrix.ocaml-version }}-${{ hashFiles('*.opam') }}
          restore-keys: |
            windows-release-${{ matrix.ocaml-version }}-

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-version }}

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Install zarith
        run: opam install zarith

      - name: Install ancient (Unix with NNP)
        if: matrix.use-ancient
        run: opam install ancient

      - name: Configure Geneweb
        run: opam exec -- ocaml ./configure.ml --sosa-zarith ${{ matrix.use-ancient && '--gwd-caching' || '' }}

      - name: Build distribution
        run: opam exec -- make distrib

      - name: Create release archive
        shell: bash
        working-directory: distribution
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            7z a -tzip ../${{ matrix.archive-name }} * -mx=9
          else
            zip -r ../${{ matrix.archive-name }} *
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive-name }}
          fail_on_unmatched_files: true
          prerelease: ${{ startsWith(github.ref, 'refs/tags/test-') || (github.event_name == 'workflow_dispatch' && inputs.prerelease) }}
          draft: false