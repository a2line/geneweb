name: GeneWeb CI
on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'etc/**'
      - 'hd/**'
      - 'man/**'
      - '**/*.md'
      - 'geneweb_colab.ipynb'
      - 'ICHANGES'
      - 'INSTALL'
      - 'LICENSE'
      - 'CHANGES'
      - '.gitattributes'
      - '.gitignore'
      - '.git-blame-ignore-revs'
      - '.ocamlformat'
      - '.ocamlformat-ignore'
      - 'geneweb.iss'
      - 'geneweb.opam.template'
  push:
    branches:
      - master
    paths-ignore:
      - 'etc/**'
      - 'hd/**'
      - 'man/**'
      - '**/*.md'
      - 'geneweb_colab.ipynb'
      - 'ICHANGES'
      - 'INSTALL'
      - 'LICENSE'
      - 'CHANGES'
      - '.gitattributes'
      - '.gitignore'
      - '.git-blame-ignore-revs'
      - '.ocamlformat'
      - '.ocamlformat-ignore'
      - 'geneweb.iss'
      - 'geneweb.opam.template'

env:
  OPAMYES: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-latest]
        ocaml-compiler: [4.14.2, 5.3.0]
        setup-version: [v3]
        include:
          - os: ubuntu-22.04
            ocaml-compiler: 4.08.1
            setup-version: v2
          - os: macos-13
            ocaml-compiler: 4.08.1
            setup-version: v2
          - os: windows-latest
            ocaml-compiler: 4.08.1
            setup-version: v2

    outputs:
      total_matrix_jobs: ${{ strategy.job-total || 0 }}
      metric: ${{ steps.collect-metrics.outputs.metric }}

    env:
      FMT_CI: ${{ matrix.os == 'ubuntu-24.04' && matrix.ocaml-compiler == '4.14.2' && matrix.setup-version == 'v3' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Start Build Timer
        uses: ./.github/actions/ci-utils
        with:
          command: start-timer

      - name: Cache Opam dependencies (Unix)
        id: cache-opam-unix
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ~/.opam
          key: unix-${{ matrix.ocaml-compiler }}-${{ env.FMT_CI == 'true' && 'with-test' || 'no-test' }}-${{ matrix.setup-version }}-${{ hashFiles('*.opam') }}-cache
          restore-keys: unix-${{ matrix.ocaml-compiler }}-${{ env.FMT_CI == 'true' && 'with-test' || 'no-test' }}-${{ matrix.setup-version }}

      - name: Cache Opam dependencies (Windows)
        id: cache-opam-windows
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: D:\.opam
          key: windows-${{ matrix.ocaml-compiler }}-${{ env.FMT_CI == 'true' && 'with-test' || 'no-test' }}-${{ matrix.setup-version }}-${{ hashFiles('*.opam') }}-cache
          restore-keys: windows-${{ matrix.ocaml-compiler }}-${{ env.FMT_CI == 'true' && 'with-test' || 'no-test' }}-${{ matrix.setup-version }}

      - name: Setup Ocaml with v2
        if: matrix.setup-version == 'v2'
        uses: ocaml/setup-ocaml@v2
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          
      - name: Setup Ocaml with v3
        if: matrix.setup-version == 'v3'
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Pin camlp5 and not-ocamlfind without installing
        if: matrix.setup-version == 'v3'
        run: |
          opam pin add --no-action camlp5 https://github.com/camlp5/camlp5.git
          opam pin add --no-action not-ocamlfind https://github.com/chetmurthy/not-ocamlfind.git

      - name: Install Geneweb dependencies
        run: opam install . --deps-only ${{ env.FMT_CI == 'true' && '--with-test' || '' }}

      - name: Install ancient dependency for Unix
        if: ${{ runner.os != 'Windows' }}
        run: opam pin ancient -y https://github.com/OCamlPro/ocaml-ancient.git

      - name: Run Camlp5 test suite
        run: |
          echo "==== Environment Info ===="
          if command -v ocaml &> /dev/null; then
            echo "OCaml version: $(ocaml -version)"
          else
            echo "OCaml command not found"
          fi
          
          if command -v opam &> /dev/null; then
            echo "OPAM version: $(opam --version)"
            echo "OPAM switch: $(opam switch show)"
            echo "Setting up OPAM environment..."
            eval $(opam env)
          else
            echo "OPAM command not found"
          fi
          
          echo "OS: $RUNNER_OS"
          echo "Setup version: ${{ matrix.setup-version }}"
          echo "=========================="
          
          # Create a simplified test wrapper that doesn't require Perl modules
          create_test_wrapper() {
            mkdir -p camlp5-buildscripts
            echo '#!/bin/bash' > camlp5-buildscripts/LAUNCH
            echo '# Simple wrapper that doesn'"'"'t require Perl modules' >> camlp5-buildscripts/LAUNCH
            echo 'echo "LAUNCH wrapper called with: $@"' >> camlp5-buildscripts/LAUNCH
            echo 'exec "$@"' >> camlp5-buildscripts/LAUNCH
            chmod +x camlp5-buildscripts/LAUNCH
            echo "Created simplified LAUNCH wrapper"
          }
          
          # Find Camlp5 directory
          find_camlp5_dir() {
            local prefix=$1
            local candidates=""
            
            for path in "$prefix/.opam-switch/build" "$prefix/.opam-switch/sources" "$prefix/lib"; do
              if [ -d "$path" ]; then
                local found=$(find "$path" -type d -name "camlp5*" 2>/dev/null)
                candidates="$candidates $found"
              fi
            done
            
            # First look for testsuite directories
            for dir in $candidates; do
              if [ -d "$dir/testsuite" ]; then
                echo "$dir"
                return 0
              fi
            done
            
            # If no testsuite found, return any camlp5 directory
            for dir in $candidates; do
              if [ -n "$dir" ]; then
                echo "$dir"
                return 0
              fi
            done
            
            return 1
          }
          
          # Get OPAM prefix
          if command -v opam &> /dev/null; then
            OPAM_PREFIX=$(opam var prefix)
            echo "OPAM prefix: $OPAM_PREFIX"
          else
            # Fallbacks for different environments
            if [ "$RUNNER_OS" == "Windows" ]; then
              OPAM_PREFIX="D:/a/geneweb/geneweb/_opam"
            elif [ "$RUNNER_OS" == "Linux" ]; then
              OPAM_PREFIX="/home/runner/work/geneweb/geneweb/_opam"
            elif [ "$RUNNER_OS" == "macOS" ]; then
              OPAM_PREFIX="/Users/runner/work/geneweb/geneweb/_opam"
            fi
            echo "Using fallback OPAM prefix: $OPAM_PREFIX"
          fi
          
          # Find Camlp5 directory
          CAMLP5_DIR=$(find_camlp5_dir "$OPAM_PREFIX")
          
          if [ -n "$CAMLP5_DIR" ]; then
            echo "Found Camlp5 directory: $CAMLP5_DIR"
            
            if [ -d "$CAMLP5_DIR/testsuite" ]; then
              echo "Testsuite directory exists. Contents:"
              ls -la "$CAMLP5_DIR/testsuite"
              
              # Create simplified test wrapper
              cd "$CAMLP5_DIR/testsuite"
              create_test_wrapper
              export PATH="$PWD/camlp5-buildscripts:$PATH"
              
              # Try to run just a few specific tests that don't require dependencies
              echo "===== RUNNING SIMPLIFIED CAMLP5 TESTS ====="
              
              # Check if mkcamlp5 exists
              if command -v mkcamlp5 &> /dev/null; then
                echo "Testing mkcamlp5 tools..."
                make -k tools/ROUNDTRIP-pa_r-pr_r.byte tools/ROUNDTRIP-pa_o-pr_o.byte || echo "Tool build failed, continuing"
              else
                echo "mkcamlp5 not available, skipping tool builds"
              fi
              
              echo "Done with Camlp5 tests"
            else
              echo "No testsuite directory found"
            fi
          else
            echo "Could not find any Camlp5 directory"
            echo "Available directories:"
            find "$OPAM_PREFIX" -name "camlp5*" -type d 2>/dev/null || echo "No camlp5 directories found"
          fi
        shell: bash

      - name: Configure
        run: opam exec -- ocaml ./configure.ml --sosa-zarith

      - name: Build Geneweb
        run: opam exec -- make ${{ env.FMT_CI == 'true' && 'fmt ci' || 'build' }} distrib

      - name: "Test Geneweb daemon with --cache-in-memory"
        if: ${{ runner.os != 'Windows' }}
        run: |
          output=$(distribution/gw/gwd -cache-in-memory testing 2>&1)
          if echo "$output" | grep -q "Caching database testing in memory"; then
            echo "Caching message found, test passed."
            exit 0
          else
            echo "Caching message not found, test failed."
            exit 1
          fi

      - name: Collect Build Metrics
        id: collect-metrics
        uses: ./.github/actions/ci-utils
        with:
          command: collect-metrics
          os: ${{ matrix.os }}
          ocaml-version: ${{ matrix.ocaml-compiler }}
          cache-hit: ${{ runner.os != 'Windows' && steps.cache-opam-unix.outputs.cache-hit || steps.cache-opam-windows.outputs.cache-hit }}

  build-results:
    needs: [build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Build Summary
        uses: ./.github/actions/ci-utils
        with:
          command: generate-summary
          total-builds: ${{ needs.build.outputs.total_matrix_jobs }}
